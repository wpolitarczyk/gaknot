variables:
  MPLBACKEND: "Agg"

test_notebooks:
  script:
    - zsh -l -c "source ~/.zshrc && load_conda && conda activate sage_env && pip install nbmake ipytest && cd gaknot_lib && python3 clean.py && for f in *.sage; do sage --preparse \$f && mv \$f.py \${f%.sage}.py; done && cd .. && pytest --nbmake test/*.ipynb --nbmake-kernel=sagemath"
  only:
    - master
